<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workloop</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #eef1f4;
      --line: #d8dde3;
      --text: #1b2026;
      --muted: #626b75;
      --accent: #1769aa;
      --accent-strong: #0f527f;
      --green: #197a4b;
      --green-bg: #e8f5ed;
      --amber: #946200;
      --amber-bg: #fff3d2;
      --red: #ad2f2f;
      --red-bg: #fdecec;
      --purple: #6950a1;
      --focus: #f0a400;
      --shadow: 0 8px 24px rgba(23, 31, 42, .08);
    }
    * { box-sizing: border-box; letter-spacing: 0; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body { font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    button, input, textarea, select { font: inherit; color: inherit; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible,
    [tabindex]:focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 70%, transparent); outline-offset: 2px; }
    button { border: 0; cursor: pointer; }
    .skip-link { position: fixed; left: 10px; top: -60px; z-index: 100; padding: 8px 10px; background: #fff; color: #111; }
    .skip-link:focus { top: 8px; }
    .topbar {
      height: 58px; display: flex; align-items: center; gap: 14px; padding: 0 18px;
      background: #20262d; color: #fff; border-bottom: 1px solid #11161b;
      position: sticky; top: 0; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 260px; }
    .brand-mark {
      width: 28px; height: 28px; display: grid; place-items: center; border-radius: 6px;
      background: #f0a400; color: #20262d; font-weight: 800;
    }
    .brand strong { font-size: 16px; }
    .top-spacer { flex: 1; }
    .metrics { display: flex; gap: 10px; font-size: 12px; white-space: nowrap; }
    .metric strong { font-variant-numeric: tabular-nums; }
    .top-btn, .icon-btn {
      min-height: 34px; border-radius: 6px; background: transparent; color: inherit;
      border: 1px solid #59636e; padding: 6px 10px;
    }
    .top-btn:hover, .icon-btn:hover { background: rgba(255,255,255,.09); }
    .icon-btn { width: 36px; padding: 0; font-size: 19px; }
    .primary { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
    .primary:hover { background: var(--accent-strong); }
    .danger { background: var(--red); color: #fff; border: 1px solid var(--red); }
    .quiet { background: var(--surface); border: 1px solid var(--line); }
    .quiet:hover { background: var(--surface-2); }
    .app { display: grid; grid-template-columns: 310px minmax(0, 1fr); min-height: calc(100vh - 58px); }
    .sidebar { background: var(--surface); border-right: 1px solid var(--line); min-width: 0; }
    .side-head { padding: 15px 14px 10px; border-bottom: 1px solid var(--line); }
    .side-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .side-title h1 { font-size: 15px; margin: 0; }
    .filter-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: var(--surface-2); padding: 3px; border-radius: 6px; }
    .filter-tabs button { background: transparent; border-radius: 4px; padding: 6px 4px; font-size: 12px; color: var(--muted); }
    .filter-tabs button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .task-list { height: calc(100vh - 150px); overflow: auto; }
    .task-row {
      width: 100%; text-align: left; padding: 12px 14px; background: transparent;
      border-bottom: 1px solid var(--line); display: grid; gap: 7px; min-height: 86px;
    }
    .task-row:hover { background: #f7f9fb; }
    .task-row.selected { background: #eaf3fa; box-shadow: inset 3px 0 var(--accent); }
    .task-row-top { display: flex; align-items: flex-start; gap: 8px; }
    .task-row-title { font-weight: 650; min-width: 0; overflow-wrap: anywhere; flex: 1; }
    .task-meta { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }
    .status {
      display: inline-flex; align-items: center; min-height: 22px; padding: 2px 7px;
      border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap;
      color: #34404c; background: var(--surface-2);
    }
    .status.running, .status.queued { color: var(--accent-strong); background: #deeffb; }
    .status.human, .status.paused { color: var(--amber); background: var(--amber-bg); }
    .status.failed, .status.blocked { color: var(--red); background: var(--red-bg); }
    .status.ready, .status.delivered { color: var(--green); background: var(--green-bg); }
    .workspace { min-width: 0; }
    .empty { height: calc(100vh - 58px); display: grid; place-items: center; color: var(--muted); }
    .detail { max-width: 1180px; margin: 0 auto; padding: 20px 26px 60px; }
    .detail-head { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 18px; }
    .mobile-back { display: none; }
    .detail-title { min-width: 0; flex: 1; }
    .detail-title h2 { font-size: 22px; line-height: 1.25; margin: 0 0 5px; overflow-wrap: anywhere; }
    .detail-title p { margin: 0; color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .resolution { max-width: 360px; padding: 8px 10px; border-left: 3px solid var(--amber); background: var(--amber-bg); }
    .resolution strong, .resolution span { display: block; }
    .resolution span { margin-top: 2px; color: #594b25; font-size: 12px; }
    .cmd { min-height: 36px; padding: 7px 12px; border-radius: 6px; }
    .pipeline {
      display: grid; grid-template-columns: repeat(6, minmax(72px, 1fr)); gap: 0;
      margin: 0 0 22px; border: 1px solid var(--line); background: var(--surface);
    }
    .stage { position: relative; min-height: 64px; padding: 11px 10px 9px 34px; border-right: 1px solid var(--line); }
    .stage:last-child { border-right: 0; }
    .stage::before {
      content: ""; position: absolute; left: 12px; top: 15px; width: 12px; height: 12px;
      border: 2px solid #a9b1ba; border-radius: 50%; background: var(--surface);
    }
    .stage.done::before { background: var(--green); border-color: var(--green); }
    .stage.current::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px #dcebfa; }
    .stage strong { display: block; font-size: 12px; }
    .stage span { color: var(--muted); font-size: 11px; }
    .alert { padding: 11px 13px; border-left: 4px solid var(--amber); background: var(--amber-bg); margin-bottom: 18px; overflow-wrap: anywhere; }
    .alert.error { border-color: var(--red); background: var(--red-bg); }
    .section { padding: 18px 0; border-top: 1px solid var(--line); }
    .section:first-of-type { border-top: 0; }
    .section h3 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; justify-content: space-between; }
    .section h4 { font-size: 13px; margin: 15px 0 7px; }
    .kv { display: grid; grid-template-columns: 170px minmax(0, 1fr); gap: 7px 14px; margin: 0; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; overflow-wrap: anywhere; }
    .compact-list { margin: 0; padding-left: 19px; }
    pre {
      margin: 0; padding: 13px; overflow: auto; max-height: 440px; background: #20262d;
      color: #e7edf3; border-radius: 6px; font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: pre-wrap; overflow-wrap: anywhere;
    }
    .diff-add { color: #91e2aa; } .diff-del { color: #ff9d9d; } .diff-head { color: #8dc8ff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; vertical-align: top; padding: 8px 9px; border-bottom: 1px solid var(--line); overflow-wrap: anywhere; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .pass { color: var(--green); font-weight: 700; } .fail { color: var(--red); font-weight: 700; }
    .event-list { display: grid; gap: 0; border-left: 2px solid var(--line); margin-left: 7px; }
    .event { position: relative; display: grid; grid-template-columns: 110px 130px minmax(0, 1fr); gap: 10px; padding: 7px 10px 7px 17px; }
    .event::before { content: ""; position: absolute; left: -6px; top: 13px; width: 10px; height: 10px; border-radius: 50%; background: var(--surface); border: 2px solid var(--purple); }
    .event small { color: var(--muted); }
    details summary { cursor: pointer; color: var(--accent-strong); font-weight: 650; }
    dialog { width: min(600px, calc(100vw - 28px)); border: 1px solid var(--line); border-radius: 8px; padding: 0; box-shadow: var(--shadow); }
    dialog::backdrop { background: rgba(20, 27, 34, .52); }
    .dialog-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .dialog-head h2 { margin: 0; font-size: 17px; }
    .dialog-body { padding: 16px; display: grid; gap: 13px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line); }
    label { display: grid; gap: 5px; font-weight: 650; }
    label span { font-size: 12px; color: var(--muted); font-weight: 500; }
    input, textarea, select { width: 100%; border: 1px solid #aeb6bf; border-radius: 5px; padding: 8px 9px; background: #fff; }
    textarea { min-height: 110px; resize: vertical; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .runtime-grid { display: grid; grid-template-columns: 110px 1fr 1fr; gap: 0; }
    .runtime-grid > div { padding: 9px; border-bottom: 1px solid var(--line); }
    .health-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #8f98a3; margin-right: 6px; }
    .health-dot.ok { background: var(--green); } .health-dot.bad { background: var(--red); }
    .toast { position: fixed; right: 18px; bottom: 18px; max-width: 420px; padding: 10px 13px; border-radius: 6px; background: #20262d; color: #fff; box-shadow: var(--shadow); z-index: 50; }
    .hidden { display: none !important; }
    @media (max-width: 820px) {
      .topbar { padding: 0 10px; } .brand { min-width: 0; } .brand span { display: none; }
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; }
      .task-list { height: auto; max-height: 42vh; }
      .app.has-selection .sidebar { display: none; }
      .mobile-back { display: inline-flex; align-items: center; align-self: start; }
      .detail { padding: 15px 14px 50px; }
      .detail-head { display: grid; } .actions { justify-content: flex-start; }
      .pipeline { grid-template-columns: repeat(3, 1fr); }
      .stage:nth-child(3) { border-right: 0; } .stage:nth-child(-n+3) { border-bottom: 1px solid var(--line); }
      .kv { grid-template-columns: 1fr; gap: 2px; } .kv dd { margin-bottom: 7px; }
      .event { grid-template-columns: 90px 1fr; } .event > :last-child { grid-column: 1 / -1; }
      .form-grid { grid-template-columns: 1fr; }
      .runtime-grid { grid-template-columns: 90px 1fr; }
      .runtime-grid > div:nth-child(3n) { grid-column: 2; }
    }
    @media (max-width: 389px) {
      .topbar { height: auto; min-height: 58px; gap: 7px; flex-wrap: wrap; padding: 7px 8px; }
      .brand strong, .top-btn:not(.primary) { display: none; }
      .brand { min-width: 28px; }
      .metrics { order: 4; width: 100%; justify-content: space-between; gap: 4px; }
      .app { min-height: calc(100vh - 91px); }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#workspace">跳到任务详情</a>
  <header class="topbar">
    <div class="brand"><div class="brand-mark" aria-hidden="true">W</div><strong>Workloop</strong><span>任务操作台</span></div>
    <div class="top-spacer"></div>
    <div class="metrics" id="metrics" role="status" aria-live="polite" aria-label="运行指标">
      <span class="metric">运行 <strong id="metricRunning">0</strong></span>
      <span class="metric">待处理 <strong id="metricWaiting">0</strong></span>
      <span class="metric">异常 <strong id="metricProblems">0</strong></span>
      <span class="metric">待交付 <strong id="metricReady">0</strong></span>
    </div>
    <button class="top-btn" id="runtimeButton" type="button">运行时</button>
    <button class="icon-btn" id="refreshButton" type="button" title="刷新" aria-label="刷新任务">↻</button>
    <button class="top-btn primary" id="newTaskButton" type="button">新建任务</button>
  </header>
  <main class="app" id="app">
    <aside class="sidebar" aria-label="任务列表">
      <div class="side-head">
        <div class="side-title"><h1>任务</h1><button class="icon-btn quiet" id="projectButton" type="button" title="注册项目" aria-label="注册项目">＋</button></div>
        <div class="filter-tabs" role="group" aria-label="任务筛选">
          <button type="button" data-filter="all" aria-pressed="true" class="active">全部</button>
          <button type="button" data-filter="attention" aria-pressed="false">待处理</button>
          <button type="button" data-filter="ready" aria-pressed="false">待交付</button>
        </div>
      </div>
      <div class="task-list" id="taskList" aria-live="polite"></div>
    </aside>
    <section class="workspace" id="workspace" aria-live="polite"><div class="empty">暂无任务</div></section>
  </main>
  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <dialog id="taskDialog" aria-labelledby="taskDialogTitle">
    <form method="dialog" id="taskForm">
      <div class="dialog-head"><h2 id="taskDialogTitle">新建任务</h2><button class="icon-btn quiet" value="cancel" aria-label="关闭">×</button></div>
      <div class="dialog-body">
        <label>项目<select id="taskProject" required></select></label>
        <label>标题<input id="taskTitle" required maxlength="160"></label>
        <label>需求<textarea id="taskRequirement" required></textarea></label>
        <details><summary>预算</summary><div class="form-grid" style="margin-top:12px">
          <label>总时长（秒）<input id="taskTotal" type="number" min="1" value="7200"></label>
          <label>单次调用（秒）<input id="taskCall" type="number" min="1" value="1800"></label>
          <label>无事件（秒）<input id="taskIdle" type="number" min="1" value="120"></label>
          <label>最大轮次<input id="taskRounds" type="number" min="1" value="3"></label>
        </div></details>
      </div>
      <div class="dialog-actions"><button class="cmd quiet" value="cancel">取消</button><button class="cmd primary" type="submit" value="default">创建</button></div>
    </form>
  </dialog>

  <dialog id="projectDialog" aria-labelledby="projectDialogTitle">
    <form method="dialog" id="projectForm">
      <div class="dialog-head"><h2 id="projectDialogTitle">注册项目</h2><button class="icon-btn quiet" value="cancel" aria-label="关闭">×</button></div>
      <div class="dialog-body">
        <label>名称<input id="projectName" required maxlength="120"></label>
        <label>仓库目录<input id="projectPath" required></label>
        <div class="form-grid"><label>目标分支<input id="projectBranch" value="main"></label><label>项目配置<input id="projectConfig" value=".workloop/project.toml"></label></div>
      </div>
      <div class="dialog-actions"><button class="cmd quiet" value="cancel">取消</button><button class="cmd primary" type="submit" value="default">注册</button></div>
    </form>
  </dialog>

  <dialog id="runtimeDialog" aria-labelledby="runtimeDialogTitle">
    <div class="dialog-head"><h2 id="runtimeDialogTitle">运行时</h2><button class="icon-btn quiet" data-close="runtimeDialog" aria-label="关闭">×</button></div>
    <div class="dialog-body" id="runtimeBody"></div>
  </dialog>

  <dialog id="budgetDialog" aria-labelledby="budgetDialogTitle">
    <form method="dialog" id="budgetForm">
      <div class="dialog-head"><h2 id="budgetDialogTitle">调整预算</h2><button class="icon-btn quiet" value="cancel" aria-label="关闭">×</button></div>
      <div class="dialog-body form-grid">
        <label>总时长（秒）<input id="budgetTotal" type="number" min="1" required></label>
        <label>单次调用（秒）<input id="budgetCall" type="number" min="1" required></label>
        <label>无事件（秒）<input id="budgetIdle" type="number" min="1" required></label>
        <label>最大轮次<input id="budgetRounds" type="number" min="1" required></label>
        <label>费用上限（USD）<input id="budgetCost" type="number" min="0.01" step="0.01"></label>
      </div>
      <div class="dialog-actions"><button class="cmd quiet" value="cancel">取消</button><button class="cmd primary" type="submit" value="default">更新</button></div>
    </form>
  </dialog>

  <dialog id="clarificationDialog" aria-labelledby="clarificationDialogTitle">
    <form method="dialog" id="clarificationForm">
      <div class="dialog-head"><h2 id="clarificationDialogTitle">回答澄清</h2><button class="icon-btn quiet" value="cancel" aria-label="关闭">×</button></div>
      <div class="dialog-body">
        <p id="clarificationQuestion"></p>
        <label>答复<textarea id="clarificationAnswer" required></textarea></label>
      </div>
      <div class="dialog-actions"><button class="cmd quiet" value="cancel">取消</button><button class="cmd primary" type="submit" value="default">提交答复</button></div>
    </form>
  </dialog>

  <dialog id="deliveryDialog" aria-labelledby="deliveryDialogTitle">
    <form method="dialog" id="deliveryForm">
      <div class="dialog-head"><h2 id="deliveryDialogTitle">确认交付</h2><button class="icon-btn quiet" value="cancel" aria-label="关闭">×</button></div>
      <div class="dialog-body"><label>策略<select id="deliveryStrategy"><option value="merge">Merge</option><option value="cherry-pick">Cherry-pick</option></select></label></div>
      <div class="dialog-actions"><button class="cmd quiet" value="cancel">取消</button><button class="cmd danger" type="submit" value="default">确认交付</button></div>
    </form>
  </dialog>

  <script>
    const state = { tasks: [], projects: [], selected: null, detail: null, filter: "all" };
    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const labels = {
      queued_for_analysis:"排队分析", analyzing:"分析中", waiting_for_plan_approval:"待批准计划",
      queued_for_execution:"排队执行", queued_for_recovery:"排队恢复", executing:"执行中",
      validating:"验证中", reviewing:"审核中", replanning:"重新规划", interrupted:"已中断",
      paused:"已暂停", failed:"失败", blocked:"阻塞", integration_required:"待重新整合",
      integrating:"重新整合", ready_to_deliver:"待交付", delivered:"已交付", cancelled:"已取消", draft:"草稿"
    };
    const running = new Set(["queued_for_analysis","queued_for_execution","queued_for_recovery","analyzing","executing","validating","reviewing","replanning","integrating"]);
    const human = new Set(["waiting_for_plan_approval","interrupted","paused","integration_required"]);
    function statusClass(s) { if (running.has(s)) return s.startsWith("queued") ? "queued" : "running"; if (human.has(s)) return s === "paused" ? "paused" : "human"; if (["failed","blocked"].includes(s)) return s; if (["ready_to_deliver","delivered"].includes(s)) return s === "delivered" ? "delivered" : "ready"; return ""; }
    function fmtTime(value) { if (!value) return ""; const d = new Date(value); return Number.isNaN(d.valueOf()) ? value : d.toLocaleString([], {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
    async function api(path, options={}) { const response = await fetch(path, {headers:{"Content-Type":"application/json"}, ...options}); const data = await response.json(); if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`); return data; }
    const post = (path, body={}) => api(path, {method:"POST", body:JSON.stringify(body)});
    function toast(message) { const el=$("toast"); el.textContent=message; el.classList.remove("hidden"); clearTimeout(toast.timer); toast.timer=setTimeout(()=>el.classList.add("hidden"),3600); }
    function filteredTasks() { if (state.filter === "attention") return state.tasks.filter(t => human.has(t.status) || ["failed","blocked"].includes(t.status)); if (state.filter === "ready") return state.tasks.filter(t => t.status === "ready_to_deliver"); return state.tasks; }
    function taskKey(t){return t.task_key||t.task_id;}
    function renderTasks() { const list=filteredTasks(); $("taskList").innerHTML=list.length ? list.map(t=>`<button type="button" class="task-row ${taskKey(t)===state.selected?"selected":""}" data-task="${esc(taskKey(t))}"><span class="task-row-top"><span class="task-row-title">${esc(t.title)}</span><span class="status ${statusClass(t.status)}">${esc(labels[t.status]||t.status)}</span></span><span class="task-meta"><span>${esc(t.read_only?"历史 · 只读":t.project_name||t.project_id)}</span><span>${t.queue_position?`队列 ${t.queue_position}`:fmtTime(t.updated_at)}</span></span></button>`).join("") : `<div class="empty" style="height:180px">当前筛选无任务</div>`; document.querySelectorAll("[data-task]").forEach(el=>el.onclick=()=>{const task=state.tasks.find(t=>taskKey(t)===el.dataset.task);selectTask(el.dataset.task,task?.detail_url)}); }
    async function loadProjects() { state.projects=await api("/api/agent/projects"); $("taskProject").innerHTML=state.projects.map(p=>`<option value="${esc(p.project_id)}">${esc(p.name)}</option>`).join(""); }
    function renderMetrics(metrics) { const tasks=metrics.tasks||{}; $("metricRunning").textContent=tasks.running||0; $("metricWaiting").textContent=tasks.waiting_for_human||0; $("metricProblems").textContent=(tasks.failed||0)+(tasks.blocked||0); $("metricReady").textContent=tasks.ready_to_deliver||0; }
    async function loadTasks(refreshDetail=false) { const [active,history,metrics]=await Promise.all([api("/api/agent/tasks"),api("/api/agent/history"),api("/api/agent/metrics")]); state.tasks=[...active,...history]; renderTasks(); renderMetrics(metrics); if (state.selected && refreshDetail){const task=state.tasks.find(t=>taskKey(t)===state.selected);if(task)await loadDetail(state.selected,task.detail_url);} }
    async function selectTask(key,detailUrl) { state.selected=key; location.hash=encodeURIComponent(key); $("app").classList.add("has-selection"); renderTasks(); await loadDetail(key,detailUrl); }
    function stageState(detail, index) { const order={draft:0,queued_for_analysis:0,analyzing:0,waiting_for_plan_approval:1,queued_for_execution:2,executing:2,validating:3,reviewing:4,replanning:1,integration_required:5,integrating:3,ready_to_deliver:5,delivered:6}; const n=order[detail.status]??0; return index<n?"done":index===n?"current":""; }
    function pipeline(detail) { const names=["分析","计划","执行","验证","审核","交付"]; return `<div class="pipeline" aria-label="任务阶段">${names.map((name,i)=>{const state=stageState(detail,i);return `<div class="stage ${state}"${state==="current"?' aria-current="step"':""}><strong>${name}</strong><span>${i<5?`阶段 ${i+1}`:"Git"}</span></div>`}).join("")}</div>`; }
    function actionButton(a) { if (a.manual) return `<div class="resolution"><strong>${esc(a.label)}</strong><span>${esc(a.description)}</span></div>`; const cls=a.requires_confirmation?"danger":a.id==="approve"||a.id==="prepare_delivery"||a.id==="clarify"?"primary":"quiet"; return `<button class="cmd ${cls}" data-action="${esc(a.id)}"${a.description?` title="${esc(a.description)}"`:""}>${esc(a.label)}</button>`; }
    function renderPlan(plan,clarifications=[]) { if (!plan || plan.available===false) return ""; return `<section class="section"><h3>计划</h3><dl class="kv"><dt>需求理解</dt><dd>${esc(plan.requirement_understanding)}</dd><dt>实施步骤</dt><dd><ol class="compact-list">${(plan.steps||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ol></dd><dt>验收标准</dt><dd><ul class="compact-list">${(plan.acceptance_criteria||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></dd><dt>必须测试</dt><dd>${(plan.required_tests||[]).map(esc).join("、")}</dd><dt>风险</dt><dd>${(plan.risks||[]).map(esc).join("；")||"无"}</dd>${plan.open_questions?.length?`<dt>待澄清</dt><dd>${plan.open_questions.map(esc).join("；")}</dd>`:""}${clarifications.length?`<dt>澄清记录</dt><dd>${clarifications.map(x=>`${esc(x.question)}<br><strong>${esc(x.answer)}</strong>`).join("<br>")}</dd>`:""}</dl></section>`; }
    function colorDiff(diff) { return esc(diff).split("\n").map(line=>`<span class="${line.startsWith("+")&&!line.startsWith("+++")?"diff-add":line.startsWith("-")&&!line.startsWith("---")?"diff-del":line.startsWith("@@")?"diff-head":""}">${line}</span>`).join("\n"); }
    function renderRounds(rounds) { if (!rounds?.length) return ""; const latest=rounds[rounds.length-1]; let html=`<section class="section"><h3>变更与验证 <span>第 ${esc(latest.round)} 轮</span></h3>`; if(latest.diff) html+=`<h4>Diff</h4><pre>${colorDiff(latest.diff)}</pre>`; if(latest.validation) html+=`<h4>确定性验证</h4><table><thead><tr><th>检查</th><th>结果</th><th>输出</th></tr></thead><tbody>${(latest.validation.checks||[]).map(c=>`<tr><td>${esc(c.name||c.command)}</td><td class="${c.exit_code===0&&!c.error?"pass":"fail"}">${c.exit_code===0&&!c.error?"通过":"失败"}</td><td>${esc(c.error||c.stdout||"")}</td></tr>`).join("")}</tbody></table>`; if(latest.review) html+=`<h4>独立审核</h4><p><span class="status ${latest.review.verdict==="pass"?"ready":"human"}">${esc(latest.review.verdict)}</span> ${esc(latest.review.summary||"")}</p>${(latest.review.issues||[]).length?`<table><thead><tr><th>位置</th><th>问题</th><th>建议</th></tr></thead><tbody>${latest.review.issues.map(i=>`<tr><td>${esc(i.file)}:${esc(i.line)}</td><td>${esc(i.message)}</td><td>${esc(i.suggestion)}</td></tr>`).join("")}</tbody></table>`:""}`; if(rounds.length>1) html+=`<details><summary>历史轮次（${rounds.length-1}）</summary>${rounds.slice(0,-1).map(r=>`<h4>第 ${esc(r.round)} 轮 · ${esc(r.review?.verdict||(r.validation?.passed===false?"未通过":"完成"))}</h4>${r.diff?`<pre>${colorDiff(r.diff)}</pre>`:""}`).join("")}</details>`; return html+`</section>`; }
    function renderEvents(runs) { const events=[]; (runs||[]).forEach(run=>(run.events||[]).forEach(e=>events.push({...e,run_role:run.role}))); if(!events.length) return ""; return `<section class="section"><h3>运行事件</h3><div class="event-list">${events.slice(-80).map(e=>`<div class="event"><small>${esc(fmtTime(e.at))}</small><strong>${esc(e.run_role||e.role)}</strong><span>${esc(e.event_type)}${e.raw_type?` · ${esc(e.raw_type)}`:""}</span></div>`).join("")}</div></section>`; }
    function renderReport(r) { if(!r || r.available===false) return ""; return `<section class="section"><h3>DeliveryReport</h3><dl class="kv"><dt>任务提交</dt><dd><code>${esc(r.task_commit)}</code></dd><dt>目标提交</dt><dd><code>${esc(r.target_commit)}</code></dd><dt>修改文件</dt><dd>${(r.modified_files||[]).map(esc).join("、")}</dd><dt>审核</dt><dd>${esc(r.review_summary)}</dd><dt>已知风险</dt><dd>${(r.known_risks||[]).map(esc).join("；")||"无"}</dd><dt>人工后续</dt><dd>${(r.human_next_steps||[]).map(esc).join("；")}</dd></dl></section>`; }
    function renderBudget(d) { const b=d.budget||{}; return `<section class="section"><h3>运行身份与预算</h3><dl class="kv"><dt>任务分支</dt><dd><code>${esc(d.task_branch)}</code></dd><dt>基线</dt><dd><code>${esc(d.base_commit)}</code></dd><dt>Session</dt><dd>${Object.entries(d.sessions||{}).map(([k,v])=>`${esc(k)}: <code>${esc(v)}</code>`).join("<br>")||"无"}</dd><dt>活动时间</dt><dd>${Number(b.consumed_active_seconds||0).toFixed(2)} / ${esc(b.total_timeout_seconds)} 秒</dd><dt>费用</dt><dd>$${Number(b.consumed_cost_usd||0).toFixed(4)}${b.max_cost_usd!=null?` / $${esc(b.max_cost_usd)}`:""}</dd><dt>轮次</dt><dd>${esc(d.plan_iteration)} / ${esc(b.max_iterations)}</dd></dl></section>`; }
    function renderLegacyArtifact(name,item){if(!item?.available)return `<dt>${esc(name)}</dt><dd class="fail">${esc(item?.error||"不可用")}</dd>`;const content=typeof item.content==="string"?item.content:JSON.stringify(item.content,null,2);return `<dt>${esc(name)}</dt><dd><pre>${esc(content)}</pre></dd>`;}
    function renderLegacy(d){const artifacts=Object.entries(d.artifacts||{}).map(([name,item])=>renderLegacyArtifact(name,item)).join("");const plan=renderLegacyArtifact("计划",d.plan);return `<article class="detail"><div class="detail-head"><button class="cmd quiet mobile-back" id="backButton" type="button">← 任务</button><div class="detail-title"><h2>${esc(d.title)}</h2><p>历史工作流 · 只读 · <span class="status">${esc(d.status)}</span></p></div></div><div class="alert">此任务由 legacy-v1 工作流创建，仅保留只读审计视图。新执行请创建 Agent Runtime 任务。</div><section class="section"><h3>历史任务</h3><dl class="kv"><dt>目标</dt><dd>${esc(d.goal)}</dd><dt>迭代</dt><dd>${esc(d.iteration)}</dd>${plan}${artifacts}</dl></section></article>`;}
    async function loadDetail(key,detailUrl) { try { const d=await api(detailUrl||`/api/agent/tasks/${encodeURIComponent(key)}`); state.detail=d; if(d.read_only){$("workspace").innerHTML=renderLegacy(d);}else{const alert=d.error?`<div class="alert ${["failed","blocked"].includes(d.status)?"error":""}" role="alert">${esc(d.error)}</div>`:""; $("workspace").innerHTML=`<article class="detail"><div class="detail-head"><button class="cmd quiet mobile-back" id="backButton" type="button">← 任务</button><div class="detail-title"><h2>${esc(d.title)}</h2><p>${esc(d.project_name)} · <span class="status ${statusClass(d.status)}">${esc(labels[d.status]||d.status)}</span></p></div><div class="actions" aria-label="当前可用操作">${(d.actions||[]).map(actionButton).join("")}</div></div>${pipeline(d)}${alert}${renderPlan(d.plan,d.clarifications)}${renderRounds(d.rounds)}${renderEvents(d.runs)}${renderReport(d.delivery_report)}${renderBudget(d)}</article>`;} $("backButton").onclick=()=>{$("app").classList.remove("has-selection");state.selected=null;location.hash="";renderTasks();}; document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>runAction(b.dataset.action)); } catch(e){ toast(e.message); } }
    async function runAction(action) { const id=state.selected; try { if(action==="approve") await post(`/api/agent/tasks/${id}/approve`); else if(action==="clarify") return openClarification(); else if(action==="resume"||action==="rerun") await post(`/api/agent/tasks/${id}/${action}`); else if(action==="terminate"){if(!confirm("确认终止任务？"))return;await post(`/api/agent/tasks/${id}/terminate`);} else if(action==="prepare_delivery") await post(`/api/agent/tasks/${id}/prepare-delivery`); else if(action==="integrate") await post(`/api/agent/tasks/${id}/integrate`); else if(action==="update_budget") return openBudget(); else if(action==="deliver") return $("deliveryDialog").showModal(); toast("操作已提交"); await loadTasks(true); } catch(e){toast(e.message);} }
    function openClarification(){const action=(state.detail.actions||[]).find(x=>x.id==="clarify");$("clarificationQuestion").textContent=action?.description||state.detail.plan?.open_questions?.[0]||"";$("clarificationAnswer").value="";$("clarificationDialog").showModal();$("clarificationAnswer").focus();}
    function openBudget(){const b=state.detail.budget;$("budgetTotal").value=b.total_timeout_seconds;$("budgetCall").value=b.call_timeout_seconds;$("budgetIdle").value=b.idle_timeout_seconds;$("budgetRounds").value=b.max_iterations;$("budgetCost").value=b.max_cost_usd??"";$("budgetDialog").showModal();}
    async function showRuntime(){ $("runtimeDialog").showModal(); $("runtimeBody").innerHTML="加载中"; try{const d=await api("/api/agent/runtime-health");const health=d.health||{};$("runtimeBody").innerHTML=`<div class="runtime-grid"><div><strong>角色</strong></div><div><strong>Runtime / Model</strong></div><div><strong>状态</strong></div>${Object.entries(d.profiles||{}).map(([role,p])=>{const h=health[role]||health;const ok=h.available===true;return `<div>${esc(role)}</div><div>${esc(p.runtime)} · ${esc(p.model||"default")}</div><div><span class="health-dot ${ok?"ok":"bad"}"></span>${ok?"可用":esc(h.error||"不可用")}</div>`}).join("")}</div>${d.worker_error?`<div class="alert error">${esc(d.worker_error)}</div>`:""}`;}catch(e){$("runtimeBody").textContent=e.message;} }
    document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;document.querySelectorAll("[data-filter]").forEach(x=>{x.classList.toggle("active",x===b);x.setAttribute("aria-pressed",x===b?"true":"false")});renderTasks();});
    document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>$(b.dataset.close).close());
    $("refreshButton").onclick=()=>loadTasks(true).catch(e=>toast(e.message)); $("runtimeButton").onclick=showRuntime; $("projectButton").onclick=()=>$("projectDialog").showModal();
    $("newTaskButton").onclick=async()=>{if(!state.projects.length){$("projectDialog").showModal();return;}$("taskDialog").showModal();};
    $("projectForm").onsubmit=async e=>{if(e.submitter?.value==="cancel")return;e.preventDefault();try{await post("/api/agent/projects",{name:$("projectName").value,repository:$("projectPath").value,default_branch:$("projectBranch").value,config_path:$("projectConfig").value});$("projectDialog").close();await loadProjects();toast("项目已注册");}catch(err){toast(err.message);}};
    $("taskForm").onsubmit=async e=>{if(e.submitter?.value==="cancel")return;e.preventDefault();try{const task=await post("/api/agent/tasks",{project_id:$("taskProject").value,title:$("taskTitle").value,requirement:$("taskRequirement").value,budget:{total_timeout_seconds:+$("taskTotal").value,call_timeout_seconds:+$("taskCall").value,idle_timeout_seconds:+$("taskIdle").value,max_iterations:+$("taskRounds").value}});$("taskDialog").close();await loadTasks();await selectTask(task.task_id);}catch(err){toast(err.message);}};
    $("budgetForm").onsubmit=async e=>{if(e.submitter?.value==="cancel")return;e.preventDefault();try{await post(`/api/agent/tasks/${state.selected}/budget`,{total_timeout_seconds:+$("budgetTotal").value,call_timeout_seconds:+$("budgetCall").value,idle_timeout_seconds:+$("budgetIdle").value,max_iterations:+$("budgetRounds").value,max_cost_usd:$("budgetCost").value?+$("budgetCost").value:null});$("budgetDialog").close();await loadTasks(true);}catch(err){toast(err.message);}};
    $("clarificationForm").onsubmit=async e=>{if(e.submitter?.value==="cancel")return;e.preventDefault();try{await post(`/api/agent/tasks/${state.selected}/clarify`,{answer:$("clarificationAnswer").value});$("clarificationDialog").close();await loadTasks(true);toast("澄清已提交");}catch(err){toast(err.message);}};
    $("deliveryForm").onsubmit=async e=>{if(e.submitter?.value==="cancel")return;e.preventDefault();try{await post(`/api/agent/tasks/${state.selected}/deliver`,{strategy:$("deliveryStrategy").value,confirmed:true});$("deliveryDialog").close();await loadTasks(true);toast("交付完成");}catch(err){toast(err.message);}};
    window.addEventListener("hashchange",()=>{const key=decodeURIComponent(location.hash.slice(1));if(key&&key!==state.selected){const task=state.tasks.find(t=>taskKey(t)===key);if(task)selectTask(key,task.detail_url);}});
    async function init(){try{await Promise.all([loadProjects(),loadTasks()]);const key=decodeURIComponent(location.hash.slice(1));const task=state.tasks.find(t=>taskKey(t)===key);if(task)await selectTask(key,task.detail_url);}catch(e){toast(e.message);}}
    init(); setInterval(()=>loadTasks(Boolean(state.selected)).catch(()=>{}),4000);
  </script>
</body>
</html>
