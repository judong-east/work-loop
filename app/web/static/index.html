<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workloop 控制台</title>
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --surface-2: #f5f5f6;
    --surface-3: #ececee;
    --border: #e4e4e7;
    --border-soft: #ececef;
    --text: #18181b;
    --muted: #6f6f78;
    --faint: #a0a0a8;
    --ink: #0d0d0d;
    --accent: #2563eb;
    --accent-dim: #e8effd;
    --green: #15803d;
    --green-dim: #e8f6ee;
    --amber: #b45309;
    --amber-dim: #fdf2e3;
    --red: #dc2626;
    --red-dim: #fdecec;
    --purple: #7c3aed;
    --purple-dim: #f1eafd;
    --cyan: #0e7490;
    --cyan-dim: #e5f5f9;
    --mono: "Cascadia Code", Consolas, "JetBrains Mono", monospace;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16, 16, 20, .04), 0 1px 6px rgba(16, 16, 20, .03);
    --shadow-lift: 0 4px 18px rgba(16, 16, 20, .08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.65 "Segoe UI", system-ui, "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: #dbeafe; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d9d9de; border-radius: 6px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ---- 顶栏 ---- */
  header {
    display: flex; align-items: center; gap: 18px; padding: 0 24px; height: 58px;
    background: var(--surface); border-bottom: 1px solid var(--border-soft);
    position: sticky; top: 0; z-index: 5;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 15.5px; font-weight: 700; letter-spacing: .2px; }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 9px; display: grid; place-items: center;
    background: var(--ink); color: #fff; font-size: 15px;
  }
  .brand small { color: var(--faint); font-weight: 400; font-size: 12px; margin-left: 2px; }
  nav.tabs { display: flex; gap: 2px; margin-left: 10px; background: var(--surface-2); border-radius: 999px; padding: 3px; }
  nav.tabs button {
    background: none; border: none; color: var(--muted); padding: 6px 16px; border-radius: 999px;
    font: inherit; font-size: 13.5px; cursor: pointer; transition: color .12s;
  }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.on { color: var(--text); background: var(--surface); font-weight: 600; box-shadow: var(--shadow); }
  nav.tabs button .cnt {
    display: inline-block; min-width: 18px; padding: 0 5px; margin-left: 6px; border-radius: 9px;
    background: var(--amber-dim); color: var(--amber); font-size: 11.5px; font-family: var(--mono); text-align: center;
  }
  header .spacer { flex: 1; }

  /* ---- 通用控件 ---- */
  button.btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 999px;
    border: 1px solid transparent; font: inherit; font-size: 13.5px; cursor: pointer;
    background: var(--surface-2); color: var(--text); transition: background .12s, border-color .12s, opacity .12s;
  }
  button.btn:hover { background: var(--surface-3); }
  button.btn:disabled { opacity: .45; cursor: not-allowed; }
  button.btn.primary { background: var(--ink); color: #fff; font-weight: 600; }
  button.btn.primary:hover { background: #2f2f35; }
  button.btn.danger { background: var(--red); color: #fff; font-weight: 600; }
  button.btn.danger:hover { background: #c02020; }
  button.btn.ghost { background: var(--surface); border-color: var(--border); color: var(--muted); }
  button.btn.ghost:hover { color: var(--text); border-color: #cfcfd6; background: var(--surface); }
  button.btn.ok { background: var(--green-dim); color: var(--green); }
  button.btn.ok:hover { background: #d9efe2; }
  button.btn.no { background: var(--red-dim); color: var(--red); }
  button.btn.no:hover { background: #f9dede; }
  button.btn.sm { padding: 5px 14px; font-size: 12.5px; }
  input[type=text], textarea, select {
    width: 100%; padding: 9px 14px; margin: 5px 0 15px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text); font: inherit; font-size: 13.5px;
    transition: border-color .12s, box-shadow .12s;
  }
  input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: #b9b9c2; box-shadow: 0 0 0 3px rgba(24, 24, 27, .06); }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 18px) 52%, calc(100% - 13px) 52%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 34px; }
  label { font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .mono { font-family: var(--mono); font-size: .92em; }
  .muted { color: var(--muted); }
  .faint { color: var(--faint); }

  /* ---- 提示条 ---- */
  #banner {
    display: none; align-items: center; gap: 12px; margin: 0; padding: 10px 24px;
    background: var(--red-dim); color: var(--red); border-bottom: 1px solid #f6d5d5;
    white-space: pre-wrap; font-size: 13.5px;
  }
  #banner button { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; font-size: 15px; }

  /* ---- 布局 ---- */
  main { display: flex; height: calc(100vh - 58px); }
  #sidebar {
    width: 304px; flex: none; overflow-y: auto; background: var(--bg);
    border-right: 1px solid var(--border-soft); padding: 14px 12px;
  }
  #content { flex: 1; overflow-y: auto; }
  .page { max-width: 960px; margin: 0 auto; padding: 26px 32px 80px; }

  /* ---- 任务列表 ---- */
  .side-label { font-size: 11.5px; font-weight: 700; color: var(--faint); letter-spacing: .8px; text-transform: uppercase; padding: 2px 10px 8px; }
  .task-item {
    padding: 12px 14px; border-radius: 12px; cursor: pointer; margin-bottom: 6px;
    border: 1px solid transparent; background: transparent; transition: background .12s, box-shadow .12s;
  }
  .task-item:hover { background: var(--surface); box-shadow: var(--shadow); }
  .task-item.active { background: var(--surface); border-color: var(--border); box-shadow: var(--shadow); }
  .task-item .row1 { display: flex; align-items: center; gap: 8px; }
  .task-item .title { font-weight: 600; font-size: 13.5px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-item .row2 { display: flex; gap: 10px; margin-top: 4px; font-size: 11.5px; color: var(--faint); font-family: var(--mono); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .empty-side { padding: 34px 14px; text-align: center; color: var(--faint); font-size: 13px; }

  /* ---- 徽章 ---- */
  .badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .badge .dot { width: 6px; height: 6px; }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  /* ---- 卡片 ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius);
    padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .card h3 { margin: 0 0 12px; font-size: 14.5px; letter-spacing: .1px; }
  .card h3 .aux { font-weight: 400; color: var(--faint); font-size: 12px; margin-left: 8px; }

  /* ---- 任务头 ---- */
  .task-head h2 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; letter-spacing: -.2px; }
  .task-head .meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 8px; font-size: 12.5px; color: var(--muted); }
  .task-head .meta .mono { color: var(--faint); }
  .goal-line { margin-top: 12px; padding: 10px 14px; background: var(--surface-2); border-radius: 10px; font-size: 13px; }
  .goal-line b { color: var(--muted); font-weight: 600; margin-right: 8px; }
  .goal-line.error { background: var(--red-dim); color: var(--red); }
  .goal-line.error b { color: var(--red); }

  /* ---- 流水线步骤 ---- */
  .stepper { display: flex; align-items: center; margin: 20px 2px 4px; }
  .step { display: flex; align-items: center; gap: 8px; }
  .step .node {
    width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center;
    font-size: 12px; font-weight: 700; flex: none;
    background: var(--surface-2); color: var(--faint); border: 1px solid var(--border);
  }
  .step .name { font-size: 12px; color: var(--faint); white-space: nowrap; }
  .step.done .node { background: var(--green-dim); color: var(--green); border-color: transparent; }
  .step.done .name { color: var(--muted); }
  .step.active .node { background: var(--ink); color: #fff; border-color: transparent; }
  .step.active .name { color: var(--text); font-weight: 600; }
  .step.warn .node { background: var(--amber-dim); color: var(--amber); border-color: transparent; }
  .step.warn .name { color: var(--amber); font-weight: 600; }
  .step.error .node { background: var(--red-dim); color: var(--red); border-color: transparent; }
  .step.error .name { color: var(--red); font-weight: 600; }
  .step-link { flex: 1; height: 2px; border-radius: 1px; background: var(--border-soft); margin: 0 10px; min-width: 14px; }
  .step-link.done { background: #bfe3cd; }

  /* ---- 折叠块 / 计划 ---- */
  details { border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); margin-top: 12px; overflow: hidden; }
  details summary {
    cursor: pointer; padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--muted);
    list-style: none; display: flex; align-items: center; gap: 8px; user-select: none;
  }
  details summary:hover { color: var(--text); }
  details summary::before { content: "▸"; color: var(--faint); transition: transform .15s; }
  details[open] summary::before { transform: rotate(90deg); }
  details > .body { padding: 2px 18px 16px; }
  pre.plain { white-space: pre-wrap; margin: 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; color: var(--text); }

  /* ---- diff（GitHub 亮色风格）---- */
  pre.diff {
    margin: 0; padding: 10px 0; border-radius: 10px; background: var(--surface); overflow-x: auto;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.6; border: 1px solid var(--border-soft);
  }
  pre.diff span { display: block; padding: 0 14px; }
  .dl-add { color: #116329; background: #e6ffec; }
  .dl-del { color: #82071e; background: #ffebe9; }
  .dl-hunk { color: #0550ae; background: #ddf4ff; }
  .dl-meta { color: var(--faint); }

  /* ---- 审核表 ---- */
  table.issues { border-collapse: collapse; width: 100%; font-size: 12.5px; margin-top: 12px; }
  table.issues th, table.issues td { border-bottom: 1px solid var(--border-soft); padding: 8px 10px; text-align: left; vertical-align: top; }
  table.issues th { color: var(--faint); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; }
  table.issues tr:last-child td { border-bottom: none; }
  .sev { display: inline-block; padding: 1px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
  .sev-blocker { background: var(--red-dim); color: var(--red); }
  .sev-warning { background: var(--amber-dim); color: var(--amber); }
  .sev-info { background: var(--surface-2); color: var(--muted); }

  ul.plain { margin: 6px 0; padding-left: 20px; }
  ul.plain li { margin: 3px 0; }
  .file-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 12px; margin: 3px 6px 3px 0;
    background: var(--surface-2); border: 1px solid var(--border-soft); border-radius: 999px;
    font-family: var(--mono); font-size: 12px;
  }
  .file-chip .op-write { color: var(--green); font-weight: 700; } .file-chip .op-delete { color: var(--red); font-weight: 700; }

  /* ---- 经验记忆 ---- */
  .mem-item {
    display: flex; gap: 14px; align-items: flex-start; padding: 14px 18px;
    border: 1px solid var(--border-soft); border-radius: var(--radius); background: var(--surface);
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .mem-item .text { flex: 1; font-size: 13.5px; }
  .mem-item .sub { margin-top: 6px; font-size: 11.5px; color: var(--faint); font-family: var(--mono); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .mem-item .ops { display: flex; gap: 8px; flex: none; }
  .kind { display: inline-block; padding: 1px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; font-family: "Segoe UI", system-ui, sans-serif; }
  .kind-review_pattern { background: var(--purple-dim); color: var(--purple); }
  .kind-clarification { background: var(--cyan-dim); color: var(--cyan); }
  .kind-manual { background: var(--accent-dim); color: var(--accent); }
  .mem-item.rejected { opacity: .55; box-shadow: none; }
  .section-title { margin: 28px 0 12px; font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .3px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border-soft); }

  /* ---- 空状态 ---- */
  .empty { text-align: center; padding: 90px 20px; color: var(--muted); }
  .empty h2 { font-size: 22px; letter-spacing: -.3px; margin: 0 0 8px; color: var(--text); }
  .empty p { margin: 0 0 22px; color: var(--faint); }

  /* ---- 对话框 ---- */
  dialog {
    border: none; border-radius: 18px; width: 540px; max-width: 92vw; padding: 26px 28px;
    background: var(--surface); color: var(--text); box-shadow: var(--shadow-lift);
  }
  dialog::backdrop { background: rgba(24, 24, 27, .35); backdrop-filter: blur(2px); }
  dialog h3 { margin: 0 0 18px; font-size: 17px; letter-spacing: -.2px; }
  .dlg-ops { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }

  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .run-hint { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 10px; background: var(--accent-dim); color: var(--accent); font-size: 13px; }

  /* ---- 模型配置 / 运行状态 ---- */
  .model-config-row { display: flex; gap: 10px; align-items: flex-start; }
  .model-config-row input { margin-bottom: 10px; }
  .model-panel { border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); padding: 14px; margin: 0 0 15px; }
  .role-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 14px; }
  .role-field select { margin: 4px 0 0; }
  .role-field .hint { margin-top: 4px; color: var(--faint); font-family: var(--mono); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .model-warning { margin-top: 12px; padding: 9px 12px; border-radius: 10px; background: var(--amber-dim); color: var(--amber); font-size: 12.5px; }
  .profile-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .profile-pill { display: inline-flex; gap: 7px; align-items: center; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); font-size: 11.5px; }
  .profile-pill b { font-family: var(--mono); font-weight: 700; color: var(--text); }
  .model-empty { padding: 12px 14px; border-radius: 10px; background: var(--surface-2); color: var(--muted); font-size: 13px; }
  .config-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .config-bar input { max-width: 320px; margin: 5px 0; }
  .role-editor-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; padding: 14px; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); margin-bottom: 14px; }
  .role-editor-grid select { margin: 4px 0 0; }
  .model-profile-list { display: grid; gap: 10px; }
  .model-profile-row { display: grid; grid-template-columns: minmax(120px, 1fr) 110px minmax(130px, 1fr) 96px minmax(220px, 1.5fr) 80px; gap: 10px; align-items: start; padding: 12px; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); }
  .model-profile-row input, .model-profile-row select, .model-profile-row textarea { margin: 0; }
  .model-profile-row textarea { min-height: 104px; font-family: var(--mono); font-size: 12px; line-height: 1.55; resize: vertical; }
  .model-profile-row .field-title { display: block; margin-bottom: 5px; color: var(--faint); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .model-profile-row .command-help { color: var(--faint); font-size: 11.5px; margin-top: 5px; }
  .model-editor-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .workflow-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .workflow-bar input { max-width: 220px; margin: 5px 0; }
  .node-list { display: grid; gap: 10px; }
  .node-item { display: grid; grid-template-columns: 44px 1.2fr 130px 1.4fr 90px 150px; gap: 10px; align-items: center; padding: 12px; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); }
  .node-item input, .node-item select { margin: 0; }
  .node-index { color: var(--faint); font-family: var(--mono); font-weight: 700; }
  .node-ops { display: flex; gap: 6px; justify-content: flex-end; }
  .workflow-summary { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 14px; }
  .workflow-chip { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border-soft); background: var(--surface-2); font-size: 11.5px; }
  .cmd-line { display: block; width: 100%; margin-top: 3px; color: var(--faint); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 900px) { .node-item { grid-template-columns: 1fr; } .workflow-bar input { max-width: none; } }
  .model-call-list { display: grid; gap: 8px; }
  .model-call { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; border: 1px solid var(--border-soft); border-radius: 12px; background: var(--surface-2); }
  .model-call .idx { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; flex: none; background: var(--surface); color: var(--faint); font-family: var(--mono); font-size: 12px; font-weight: 700; border: 1px solid var(--border-soft); }
  .model-call .main { flex: 1; min-width: 0; }
  .model-call .line1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-weight: 600; }
  .model-call .line2 { margin-top: 5px; display: flex; gap: 12px; flex-wrap: wrap; color: var(--faint); font-family: var(--mono); font-size: 11.5px; }
  .model-call .err { margin-top: 7px; color: var(--red); font-size: 12.5px; }
  @media (max-width: 720px) {
    .role-grid { grid-template-columns: 1fr; }
    .role-editor-grid { grid-template-columns: 1fr; }
    .model-config-row { display: block; }
  }
  @media (max-width: 1080px) { .model-profile-row { grid-template-columns: 1fr; } .config-bar input { max-width: none; } }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="logo">◎</span>Workloop<small>可靠循环内核</small></div>
  <nav class="tabs">
    <button id="tab-tasks" class="on" onclick="switchView('tasks')">任务</button>
    <button id="tab-models" onclick="switchView('models')">模型</button>
    <button id="tab-workflow" onclick="switchView('workflow')">流程</button>
    <button id="tab-memory" onclick="switchView('memory')">经验记忆<span class="cnt" id="mem-cnt" style="display:none">0</span></button>
  </nav>
  <div class="spacer"></div>
  <button class="btn primary" onclick="document.getElementById('createDialog').showModal()">＋ 新建任务</button>
</header>
<div id="banner"><span id="banner-text"></span><button onclick="showError('')">✕</button></div>
<main>
  <div id="sidebar"></div>
  <div id="content"><div class="page" id="page"></div></div>
</main>

<dialog id="createDialog">
  <h3>新建任务</h3>
  <label>标题</label><input type="text" id="f-title" placeholder="一句话概括这个任务">
  <label>目标</label><input type="text" id="f-goal" placeholder="期望达成的结果">
  <label>需求描述（建议包含"验收标准"）</label><textarea id="f-input" rows="4" placeholder="目标：…&#10;验收标准：…"></textarea>
  <label>上下文文件/目录（每行一个路径，可留空）</label><textarea id="f-files" rows="3"></textarea>
  <div class="dlg-ops">
    <button class="btn ghost" onclick="this.closest('dialog').close()">取消</button>
    <button class="btn primary" onclick="createTask()">创建</button>
  </div>
</dialog>

<script>
const STATUS_META = {
  created:                 { label: "已创建",     color: "var(--faint)",  dim: "var(--surface-2)" },
  context_building:        { label: "构建上下文", color: "var(--accent)", dim: "var(--accent-dim)" },
  clarification_required:  { label: "待人工确认", color: "var(--amber)",  dim: "var(--amber-dim)" },
  policy_blocked:          { label: "策略拦截",   color: "var(--red)",    dim: "var(--red-dim)" },
  ready_for_plan:          { label: "待执行",     color: "var(--purple)", dim: "var(--purple-dim)" },
  ready_for_implementation:{ label: "执行中",     color: "var(--accent)", dim: "var(--accent-dim)" },
  validation:              { label: "审核中",     color: "var(--cyan)",   dim: "var(--cyan-dim)" },
  done:                    { label: "已完成",     color: "var(--green)",  dim: "var(--green-dim)" },
  failed:                  { label: "失败",       color: "var(--red)",    dim: "var(--red-dim)" },
};
const KIND_LABEL = { review_pattern: "审核沉淀", clarification: "人工澄清", manual: "手工录入" };
const WORKFLOW_KIND_LABEL = { parse: "解析", planner: "制定计划", executor: "执行任务", reviewer: "审核", delivery: "交付" };
const ROLE_KINDS = ["planner", "executor", "reviewer"];
let workflowConfigPath = "workflow.json";
let workflowConfig = null;
let workflowError = "";
let workflowLoading = false;

const STEPS = ["需求门禁", "计划", "执行", "代码审核", "交付"];
const MODEL_ROLES = ["planner", "executor", "reviewer", "default"];
const MODEL_ROLE_LABEL = { planner: "计划模块", executor: "执行模块", reviewer: "审核模块", default: "默认兜底" };
const MODEL_PROVIDERS = ["cli", "fake"];

let view = "tasks";
let currentId = null;
let lastDetailJson = "";
let detailTimer = null;
let modelConfigPath = "models.json";
let modelConfig = null;
let modelConfigError = "";
let modelConfigLoading = false;

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function showError(msg) {
  document.getElementById("banner-text").textContent = msg;
  document.getElementById("banner").style.display = msg ? "flex" : "none";
}

async function api(path, options) {
  const resp = await fetch(path, options);
  let data = {};
  try { data = await resp.json(); } catch (e) { /* 空响应 */ }
  if (!resp.ok) throw new Error(data.error || `请求失败（${resp.status}）`);
  return data;
}
const post = (path, payload) => api(path, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });

function fmtTime(iso) {
  if (!iso) return "";
  const t = new Date(iso), diff = (Date.now() - t.getTime()) / 1000;
  if (isNaN(diff)) return iso;
  if (diff < 60) return "刚刚";
  if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
  return `${t.getMonth() + 1}-${String(t.getDate()).padStart(2, "0")} ${String(t.getHours()).padStart(2, "0")}:${String(t.getMinutes()).padStart(2, "0")}`;
}

function badge(status, running) {
  if (running) return `<span class="badge" style="background:var(--accent-dim);color:var(--accent)"><span class="dot pulse" style="background:var(--accent)"></span>执行中</span>`;
  const m = STATUS_META[status] || { label: status, color: "var(--faint)", dim: "var(--surface-2)" };
  return `<span class="badge" style="background:${m.dim};color:${m.color}"><span class="dot" style="background:${m.color}"></span>${esc(m.label)}</span>`;
}

function modelStatusBadge(status) {
  const map = {
    running: ["var(--accent)", "var(--accent-dim)", "运行中", true],
    succeeded: ["var(--green)", "var(--green-dim)", "已完成", false],
    failed: ["var(--red)", "var(--red-dim)", "失败", false],
    unknown: ["var(--faint)", "var(--surface-2)", "未知", false],
  };
  const [color, dim, label, pulse] = map[status] || map.unknown;
  return `<span class="badge" style="background:${dim};color:${color}"><span class="dot ${pulse ? "pulse" : ""}" style="background:${color}"></span>${label}</span>`;
}

function profileByName(name) {
  return (modelConfig?.profiles || []).find(p => p.name === name) || null;
}

function profileLabel(profile) {
  if (!profile) return "";
  return `${profile.name} · ${profile.provider}/${profile.model}`;
}

async function loadModelConfig(forceRender) {
  const input = document.getElementById("a-models");
  const nextPath = (input ? input.value : modelConfigPath).trim() || "models.json";
  modelConfigPath = nextPath;
  modelConfigLoading = true;
  modelConfigError = "";
  refreshModelConfigPanel();
  try {
    modelConfig = await api(`/api/models/config?path=${encodeURIComponent(nextPath)}`);
    modelConfigError = "";
  } catch (e) {
    modelConfig = null;
    modelConfigError = e.message;
  } finally {
    modelConfigLoading = false;
    if (forceRender) lastDetailJson = "";
    refreshModelConfigPanel();
    if (view === "models") renderModels();
    if (view === "workflow") renderWorkflow();
  }
}

function refreshModelConfigPanel() {
  const body = document.getElementById("model-config-body");
  if (body) body.innerHTML = renderModelConfigBody();
}

function renderModelConfigPanel() {
  if (!modelConfig && !modelConfigLoading && !modelConfigError) setTimeout(() => loadModelConfig(false), 0);
  return `<label>模型配置文件</label>
    <div class="model-config-row">
      <input type="text" id="a-models" value="${esc(modelConfigPath)}" onblur="loadModelConfig(false)" onkeydown="if(event.key==='Enter') loadModelConfig(false)">
      <button class="btn ghost" style="flex:none;margin-top:5px" onclick="loadModelConfig(false)">刷新配置</button>
      <button class="btn ghost" style="flex:none;margin-top:5px" onclick="switchView('models')">编辑模型</button>
    </div>
    <div id="model-config-body">${renderModelConfigBody()}</div>`;
}

function renderModelConfigBody() {
  if (modelConfigLoading) return `<div class="model-empty"><span class="spin">◐</span> 正在读取模型配置...</div>`;
  if (modelConfigError) return `<div class="model-warning">${esc(modelConfigError)}</div>`;
  if (!modelConfig) return `<div class="model-empty">输入模型配置文件后刷新，可为每个模块选择角色模型。</div>`;

  const profiles = modelConfig.profiles || [];
  if (!profiles.length) return `<div class="model-warning">这个配置文件没有 profiles。</div>`;
  const roles = modelConfig.roles || {};
  const fields = MODEL_ROLES.map(role => {
    const selected = workflowRoleProfile(role) || roles[role] || roles.default || profiles[0].name;
    const selectedProfile = profileByName(selected) || profiles[0];
    const options = profiles.map(p => `<option value="${esc(p.name)}" ${p.name === selected ? "selected" : ""}>${esc(profileLabel(p))}</option>`).join("");
    return `<div class="role-field">
      <label>${esc(MODEL_ROLE_LABEL[role] || role)}</label>
      <select id="role-${esc(role)}" onchange="updateRoleWarnings()">${options}</select>
      <div class="hint" id="hint-${esc(role)}">${esc(profileLabel(selectedProfile))}</div>
    </div>`;
  }).join("");
  const strip = profiles.map(p => `<span class="profile-pill"><b>${esc(p.name)}</b>${esc(p.provider)} / ${esc(p.model)}<span class="cmd-line">${esc(profileCommand(p) || "-")}</span></span>`).join("");
  return `<div class="model-panel">
    <div class="role-grid">${fields}</div>
    <div id="role-warning">${renderRoleWarning()}</div>
    <div class="profile-strip">${strip}</div>
  </div>`;
}

function selectedRoleProfile(role) {
  const el = document.getElementById(`role-${role}`);
  return el ? el.value : (modelConfig?.roles?.[role] || modelConfig?.roles?.default || "");
}

function renderRoleWarning() {
  if (!modelConfig) return "";
  const executor = profileByName(selectedRoleProfile("executor"));
  const reviewer = profileByName(selectedRoleProfile("reviewer"));
  if (executor && reviewer && executor.model === reviewer.model) {
    return `<div class="model-warning">执行模块和审核模块当前解析到同一个模型 ${esc(executor.model)}，运行时会被异构审核策略拦截。</div>`;
  }
  return "";
}

function updateRoleWarnings() {
  for (const role of MODEL_ROLES) {
    const hint = document.getElementById(`hint-${role}`);
    const profile = profileByName(selectedRoleProfile(role));
    if (hint && profile) hint.textContent = profileLabel(profile);
  }
  const warning = document.getElementById("role-warning");
  if (warning) warning.innerHTML = renderRoleWarning();
}

function collectRoleOverrides() {
  const roles = {};
  for (const role of MODEL_ROLES) {
    const el = document.getElementById(`role-${role}`);
    if (el && el.value) roles[role] = el.value;
  }
  return roles;
}

function modelProviderOptions(selected) {
  return MODEL_PROVIDERS.map(provider => `<option value="${esc(provider)}" ${provider === selected ? "selected" : ""}>${esc(provider)}</option>`).join("");
}

function modelProfileOptions(selected) {
  const profiles = modelConfig?.profiles || [];
  return profiles.map(profile => `<option value="${esc(profile.name)}" ${profile.name === selected ? "selected" : ""}>${esc(profileLabel(profile))}</option>`).join("");
}

function commandText(profile) {
  return (profile.command || []).join("\n");
}

function renderModels() {
  if (!modelConfig && !modelConfigLoading && !modelConfigError) setTimeout(() => loadModelConfig(false), 0);
  const profiles = modelConfig?.profiles || [];
  const roles = modelConfig?.roles || {};
  let html = `<div class="card"><h3>模型配置<span class="aux">直接编辑 models.json；任务和流程节点会使用这里的 profile</span></h3>
    <div class="config-bar">
      <label>配置文件</label><input type="text" id="models-editor-path" value="${esc(modelConfigPath)}">
      <button class="btn ghost" onclick="refreshModelsEditor()">刷新</button>
      <button class="btn primary" onclick="saveModels()">保存</button>
    </div>
    ${modelConfigError ? `<div class="model-warning">${esc(modelConfigError)}</div>` : ""}
    ${modelConfigLoading ? `<div class="model-empty"><span class="spin">◐</span> 正在读取模型配置...</div>` : ""}`;

  if (!modelConfig) {
    html += `<div class="model-empty">填写配置文件路径后刷新，或新增一个模型 profile 后保存。</div>
      <div style="margin-top:12px"><button class="btn ghost" onclick="addModelProfile()">＋ 模型</button></div></div>`;
    document.getElementById("page").innerHTML = html;
    return;
  }

  html += `<div class="section-title" style="margin-top:12px">角色绑定</div>
    <div class="role-editor-grid">${MODEL_ROLES.map(role => {
      const selected = roles[role] || roles.default || profiles[0]?.name || "";
      return `<div><label>${esc(MODEL_ROLE_LABEL[role] || role)}</label><select id="model-role-${esc(role)}">${modelProfileOptions(selected)}</select></div>`;
    }).join("")}</div>
    <div class="section-title">模型 profiles</div>
    <div class="model-profile-list">${profiles.map((profile, i) => `<div class="model-profile-row">
      <div><span class="field-title">name</span><input type="text" id="model-name-${i}" value="${esc(profile.name)}" placeholder="exec-claude"></div>
      <div><span class="field-title">provider</span><select id="model-provider-${i}">${modelProviderOptions(profile.provider)}</select></div>
      <div><span class="field-title">model</span><input type="text" id="model-model-${i}" value="${esc(profile.model)}" placeholder="sonnet / opus / gpt-..."></div>
      <div><span class="field-title">timeout</span><input type="text" id="model-timeout-${i}" value="${esc(profile.timeout_seconds || 300)}"></div>
      <div><span class="field-title">command</span><textarea id="model-command-${i}" spellcheck="false" placeholder="claude&#10;-p&#10;{prompt}&#10;--model&#10;{model}">${esc(commandText(profile))}</textarea><div class="command-help">CLI 每行一个参数，必须包含 {prompt}；fake provider 可留空。</div></div>
      <div class="model-editor-actions"><button class="btn no sm" onclick="deleteModelProfile(${i})">删除</button></div>
    </div>`).join("")}</div>
    <div style="margin-top:12px"><button class="btn ghost" onclick="addModelProfile()">＋ 模型</button></div></div>`;
  document.getElementById("page").innerHTML = html;
}

function gatherModelProfiles() {
  const count = modelConfig?.profiles?.length || 0;
  const profiles = [];
  for (let i = 0; i < count; i++) {
    const timeout = Number.parseInt(document.getElementById(`model-timeout-${i}`)?.value || "300", 10);
    profiles.push({
      name: document.getElementById(`model-name-${i}`)?.value.trim() || "",
      provider: document.getElementById(`model-provider-${i}`)?.value || "cli",
      model: document.getElementById(`model-model-${i}`)?.value.trim() || "",
      timeout_seconds: Number.isFinite(timeout) ? timeout : 300,
      command: (document.getElementById(`model-command-${i}`)?.value || "").split("\n").map(s => s.trim()).filter(Boolean),
    });
  }
  return profiles;
}

function gatherModelRoles(profiles) {
  const profileNames = new Set(profiles.map(profile => profile.name).filter(Boolean));
  const roles = {};
  for (const role of MODEL_ROLES) {
    const selected = document.getElementById(`model-role-${role}`)?.value || "";
    if (selected && profileNames.has(selected)) roles[role] = selected;
  }
  if (!roles.default && profiles[0]?.name) roles.default = profiles[0].name;
  return roles;
}

function nextProfileName(profiles) {
  const names = new Set(profiles.map(profile => profile.name));
  let index = profiles.length + 1;
  let name = `model-${index}`;
  while (names.has(name)) {
    index += 1;
    name = `model-${index}`;
  }
  return name;
}

function addModelProfile() {
  const profiles = modelConfig ? gatherModelProfiles() : [];
  profiles.push({
    name: nextProfileName(profiles),
    provider: "cli",
    model: "sonnet",
    command: ["claude", "-p", "{prompt}", "--model", "{model}"],
    timeout_seconds: 600,
  });
  const roles = modelConfig ? gatherModelRoles(profiles) : { default: profiles[0].name };
  modelConfig = { ...(modelConfig || {}), profiles, roles };
  renderModels();
}

function deleteModelProfile(index) {
  const profiles = gatherModelProfiles();
  const removed = profiles[index]?.name || "";
  profiles.splice(index, 1);
  const fallback = profiles[0]?.name || "";
  const roles = { ...(modelConfig?.roles || {}) };
  for (const role of Object.keys(roles)) {
    if (roles[role] === removed) roles[role] = fallback;
  }
  modelConfig = { ...(modelConfig || {}), profiles, roles };
  renderModels();
}

async function refreshModelsEditor() {
  modelConfigPath = document.getElementById("models-editor-path")?.value.trim() || "models.json";
  workflowConfig = null;
  await loadModelConfig(true);
}

async function saveModels() {
  try {
    modelConfigPath = document.getElementById("models-editor-path")?.value.trim() || "models.json";
    const profiles = gatherModelProfiles();
    const roles = gatherModelRoles(profiles);
    modelConfig = await post(`/api/models/config?path=${encodeURIComponent(modelConfigPath)}`, { profiles, roles });
    modelConfigError = "";
    workflowConfig = null;
    showError("");
    refreshModelConfigPanel();
    renderModels();
  } catch (e) {
    showError(e.message);
  }
}

// ---- 视图切换 ----
function workflowRoleProfile(role) {
  const nodes = workflowConfig?.nodes || [];
  const node = nodes.find(n => n.enabled !== false && n.role === role && ROLE_KINDS.includes(n.kind) && n.profile);
  return node ? node.profile : "";
}

function compileWorkflowRoles() {
  const roles = {};
  for (const node of workflowConfig?.nodes || []) {
    if (node.enabled === false || !ROLE_KINDS.includes(node.kind) || roles[node.role] || !node.profile) continue;
    roles[node.role] = node.profile;
  }
  return roles;
}

function workflowPayloadForRun() {
  return workflowConfig ? { nodes: workflowConfig.nodes || [] } : null;
}

function profileCommand(profile) {
  return (profile?.command || []).join(" ");
}

async function loadWorkflow(render) {
  workflowLoading = true;
  workflowError = "";
  if (render && view === "workflow") renderWorkflow();
  try {
    const path = encodeURIComponent(workflowConfigPath || "workflow.json");
    const models = encodeURIComponent(modelConfigPath || "models.json");
    workflowConfig = await api(`/api/workflow/config?path=${path}&models_config=${models}`);
    workflowConfigPath = workflowConfig.path?.split(/[\\/]/).pop() || workflowConfigPath;
  } catch (e) {
    workflowConfig = null;
    workflowError = e.message;
  } finally {
    workflowLoading = false;
    if (render && view === "workflow") renderWorkflow();
  }
}

function renderWorkflow() {
  const nodes = workflowConfig?.nodes || [];
  const profiles = modelConfig?.profiles || [];
  const profileOptions = (selected) => profiles.map(p => `<option value="${esc(p.name)}" ${p.name === selected ? "selected" : ""}>${esc(profileLabel(p))}</option>`).join("");
  const kindOptions = (selected) => Object.entries(WORKFLOW_KIND_LABEL).map(([kind, label]) => `<option value="${esc(kind)}" ${kind === selected ? "selected" : ""}>${esc(label)}</option>`).join("");
  let html = `<div class="card"><h3>流程编排</h3>
    <div class="workflow-bar">
      <label>流程文件</label><input type="text" id="wf-path" value="${esc(workflowConfigPath)}">
      <label>模型配置</label><input type="text" id="wf-models" value="${esc(modelConfigPath)}">
      <button class="btn ghost" onclick="refreshWorkflowEditor()">刷新</button>
      <button class="btn primary" onclick="saveWorkflow()">保存</button>
    </div>
    ${workflowError ? `<div class="model-warning">${esc(workflowError)}</div>` : ""}
    ${workflowLoading ? `<div class="model-empty"><span class="spin">◐</span> 正在读取流程...</div>` : ""}`;
  html += `<div class="node-list">` + nodes.map((node, i) => `<div class="node-item">
    <div class="node-index">${i + 1}</div>
    <input type="text" id="wf-label-${i}" value="${esc(node.label)}">
    <select id="wf-kind-${i}">${kindOptions(node.kind)}</select>
    <select id="wf-profile-${i}">${profileOptions(node.profile)}</select>
    <label><input type="checkbox" id="wf-enabled-${i}" ${node.enabled !== false ? "checked" : ""}> 启用</label>
    <div class="node-ops">
      <button class="btn ghost sm" onclick="moveWorkflowNode(${i}, -1)">↑</button>
      <button class="btn ghost sm" onclick="moveWorkflowNode(${i}, 1)">↓</button>
      <button class="btn no sm" onclick="deleteWorkflowNode(${i})">删</button>
    </div>
  </div>`).join("") + `</div>
    <div style="margin-top:12px"><button class="btn ghost" onclick="addWorkflowNode()">＋ 节点</button></div></div>`;
  document.getElementById("page").innerHTML = html;
}

function gatherWorkflowNodes() {
  return (workflowConfig?.nodes || []).map((node, i) => {
    const kind = document.getElementById(`wf-kind-${i}`)?.value || node.kind;
    return {
      ...node,
      label: document.getElementById(`wf-label-${i}`)?.value.trim() || WORKFLOW_KIND_LABEL[kind] || kind,
      kind,
      role: ROLE_KINDS.includes(kind) ? kind : (node.role || "planner"),
      profile: document.getElementById(`wf-profile-${i}`)?.value || node.profile,
      enabled: document.getElementById(`wf-enabled-${i}`)?.checked !== false,
    };
  });
}

function addWorkflowNode() {
  const nodes = workflowConfig?.nodes || [];
  nodes.push({ id: `node-${Date.now()}`, label: "执行任务", kind: "executor", role: "executor", profile: modelConfig?.roles?.executor || modelConfig?.roles?.default || "", enabled: true });
  workflowConfig = { ...(workflowConfig || {}), nodes };
  renderWorkflow();
}

function moveWorkflowNode(index, delta) {
  const nodes = gatherWorkflowNodes();
  const next = index + delta;
  if (next < 0 || next >= nodes.length) return;
  [nodes[index], nodes[next]] = [nodes[next], nodes[index]];
  workflowConfig = { ...(workflowConfig || {}), nodes };
  renderWorkflow();
}

function deleteWorkflowNode(index) {
  const nodes = gatherWorkflowNodes();
  nodes.splice(index, 1);
  workflowConfig = { ...(workflowConfig || {}), nodes };
  renderWorkflow();
}

async function refreshWorkflowEditor() {
  workflowConfigPath = document.getElementById("wf-path")?.value.trim() || "workflow.json";
  modelConfigPath = document.getElementById("wf-models")?.value.trim() || "models.json";
  await loadModelConfig(false);
  await loadWorkflow(true);
}

async function saveWorkflow() {
  try {
    workflowConfigPath = document.getElementById("wf-path")?.value.trim() || "workflow.json";
    modelConfigPath = document.getElementById("wf-models")?.value.trim() || "models.json";
    const path = encodeURIComponent(workflowConfigPath);
    const models = encodeURIComponent(modelConfigPath);
    workflowConfig = await post(`/api/workflow/config?path=${path}&models_config=${models}`, { nodes: gatherWorkflowNodes() });
    showError("");
    renderWorkflow();
  } catch (e) { showError(e.message); }
}

function renderWorkflowSummary() {
  const nodes = (workflowConfig?.nodes || []).filter(n => n.enabled !== false);
  if (!nodes.length) return "";
  return `<div class="workflow-summary">${nodes.map(n => `<span class="workflow-chip">${esc(n.label)} · ${esc(n.profile || "-")}</span>`).join("")}</div>`;
}

function switchView(next) {
  view = next;
  document.getElementById("tab-tasks").classList.toggle("on", next === "tasks");
  document.getElementById("tab-models").classList.toggle("on", next === "models");
  document.getElementById("tab-memory").classList.toggle("on", next === "memory");
  document.getElementById("tab-workflow").classList.toggle("on", next === "workflow");
  document.getElementById("sidebar").style.display = next === "tasks" ? "" : "none";
  syncHash();
  if (next === "tasks") {
    lastDetailJson = "";
    currentId ? loadDetail(true) : renderTasksEmpty();
  } else if (next === "models") {
    renderModels();
    if (!modelConfig && !modelConfigLoading) loadModelConfig(true);
  } else if (next === "workflow") {
    if (!modelConfig && !modelConfigLoading) loadModelConfig(false);
    renderWorkflow();
    if (!workflowConfig && !workflowLoading) loadWorkflow(true);
  } else {
    loadMemory();
  }
}

function syncHash() {
  const hash = view === "memory" ? "#memory" : view === "models" ? "#models" : view === "workflow" ? "#workflow" : currentId ? `#${currentId}` : "";
  history.replaceState(null, "", hash || location.pathname);
}

function renderTasksEmpty() {
  document.getElementById("page").innerHTML = `<div class="empty">
    <h2>接下来做什么？</h2>
    <p>计划 → 执行 → 独立代码审核 → 人工确认 → 交付</p>
    <button class="btn primary" onclick="document.getElementById('createDialog').showModal()">＋ 新建任务</button>
  </div>`;
}

// ---- 任务列表 ----

async function loadTasks() {
  try {
    const tasks = await api("/api/tasks");
    const items = tasks.map(t => {
      const m = STATUS_META[t.status] || { color: "var(--faint)" };
      const dotColor = t.running ? "var(--accent)" : m.color;
      return `<div class="task-item ${t.task_id === currentId ? "active" : ""}" onclick="selectTask('${esc(t.task_id)}')">
        <div class="row1"><span class="dot ${t.running ? "pulse" : ""}" style="background:${dotColor}"></span>
          <span class="title">${esc(t.title)}</span></div>
        <div class="row2"><span>${esc(t.task_id)}</span><span>${t.iteration ? "R" + t.iteration : ""}</span>
          <span style="margin-left:auto">${esc(fmtTime(t.updated_at))}</span></div>
      </div>`;
    }).join("");
    document.getElementById("sidebar").innerHTML = tasks.length
      ? `<div class="side-label">任务（${tasks.length}）</div>` + items
      : `<div class="empty-side">还没有任务</div>`;
  } catch (e) { showError(e.message); }
}

function selectTask(id) {
  currentId = id;
  lastDetailJson = "";
  if (view !== "tasks") switchView("tasks");
  else { syncHash(); loadDetail(true); }
  loadTasks();
}

async function loadDetail(force) {
  if (!currentId || view !== "tasks") return;
  try {
    const d = await api(`/api/tasks/${currentId}`);
    const serialized = JSON.stringify(d);
    if (force || serialized !== lastDetailJson) {
      lastDetailJson = serialized;
      renderDetail(d);
    }
    clearTimeout(detailTimer);
    if (d.running) detailTimer = setTimeout(() => loadDetail(false), 2000);
  } catch (e) { showError(e.message); }
}

// ---- 任务详情 ----

function stepStates(d) {
  const s = d.task.status;
  const st = ["todo", "todo", "todo", "todo", "todo"];
  const mark = (n, v) => { for (let i = 0; i < n; i++) st[i] = "done"; if (n < st.length) st[n] = v; };
  if (s === "created" || s === "context_building") mark(0, "active");
  else if (s === "ready_for_plan") mark(1, "active");
  else if (s === "ready_for_implementation") mark(2, "active");
  else if (s === "validation") mark(3, "active");
  else if (s === "done") mark(4, d.delivery ? "done" : "active");
  else if (s === "failed") mark(d.plan ? 2 : 1, "error");
  else if (s === "clarification_required" || s === "policy_blocked") {
    const v = s === "policy_blocked" ? "error" : "warn";
    if (d.rounds && d.rounds.length) mark(3, v);
    else if (d.plan) mark(2, v);
    else mark(0, v);
  }
  if (d.running) { const i = st.findIndex(x => x !== "done"); if (i >= 0) st[i] = "active"; }
  return st;
}

function renderStepper(d) {
  const states = stepStates(d);
  return `<div class="stepper">` + STEPS.map((name, i) => {
    const cls = states[i];
    const icon = cls === "done" ? "✓" : cls === "warn" ? "!" : cls === "error" ? "✕" : i + 1;
    return `${i ? `<div class="step-link ${states[i - 1] === "done" ? "done" : ""}"></div>` : ""}
      <div class="step ${cls}"><span class="node">${icon}</span><span class="name">${name}</span></div>`;
  }).join("") + `</div>`;
}

function renderDetail(d) {
  const t = d.task;
  let html = `
    <div class="card task-head">
      <h2>${esc(t.title)} ${badge(t.status, d.running)}</h2>
      <div class="meta">
        <span class="mono">${esc(t.task_id)}</span>
        <span>第 ${t.iteration} 轮</span>
        <span>更新于 ${esc(fmtTime(t.updated_at))}</span>
      </div>
      <div class="goal-line"><b>目标</b>${esc(t.goal)}</div>
      ${d.run_error ? `<div class="goal-line error"><b>上次执行出错</b>${esc(d.run_error)}</div>` : ""}
      ${renderStepper(d)}
    </div>
    ${renderActions(d)}`;

  html += renderModelCalls(d);

  if (d.plan) {
    html += `<div class="card"><details open><summary>执行计划</summary><div class="body"><pre class="plain">${esc(d.plan)}</pre></div></details></div>`;
  }
  for (const r of [...d.rounds].reverse()) html += renderRound(r);
  if (d.delivery) {
    html += `<div class="card"><h3>交付记录<span class="aux">${esc(d.delivery.delivered_at)}</span></h3>
      <p class="muted" style="margin:0 0 8px">已交付到 <span class="mono">${esc(d.delivery.dest)}</span></p>
      ${(d.delivery.files || []).map(f => `<span class="file-chip">${esc(f)}</span>`).join("")}</div>`;
  }
  document.getElementById("page").innerHTML = html;
}

function renderModelCalls(d) {
  const calls = d.model_calls || [];
  if (!calls.length && !d.running) return "";
  if (!calls.length) {
    return `<div class="card"><h3>模型运行状态</h3><div class="model-empty">等待第一个模型启动...</div></div>`;
  }
  return `<div class="card"><h3>模型运行状态<span class="aux">按实际调用顺序展示，包含重试</span></h3>
    <div class="model-call-list">${calls.map(renderModelCall).join("")}</div></div>`;
}

function renderModelCall(call) {
  const roleLabel = MODEL_ROLE_LABEL[call.role] || call.role;
  const duration = call.status === "running" && call.elapsed_seconds !== null && call.elapsed_seconds !== undefined
    ? `${call.elapsed_seconds}s`
    : call.duration_seconds !== null && call.duration_seconds !== undefined ? `${call.duration_seconds}s` : "";
  return `<div class="model-call">
    <div class="idx">${esc(call.call_index || "")}</div>
    <div class="main">
      <div class="line1"><span>${esc(roleLabel)}</span>${modelStatusBadge(call.status)}${call.fallback ? `<span class="badge" style="background:var(--surface);color:var(--muted)">default</span>` : ""}</div>
      <div class="line2">
        <span>${esc(call.profile || "未解析 profile")}</span>
        <span>${esc(call.provider || "provider?")} / ${esc(call.model || "model?")}</span>
        ${duration ? `<span>${esc(duration)}</span>` : ""}
        ${call.started_at ? `<span>${esc(fmtTime(call.started_at))}</span>` : ""}
      </div>
      ${(call.command || []).length ? `<span class="cmd-line">${esc((call.command || []).join(" "))}</span>` : ""}
      ${call.error ? `<div class="err">${esc(call.error)}</div>` : ""}
    </div>
  </div>`;
}

function renderActions(d) {
  const t = d.task;
  if (d.running) {
    return `<div class="card"><div class="run-hint"><span class="spin">◐</span>
      循环执行中（第 ${t.iteration} 轮）：planner → executor → reviewer，页面自动刷新。
      <button class="btn danger sm" style="margin-left:auto" onclick="interruptTask()">中断</button></div></div>`;
  }
  if (t.status === "ready_for_plan") {
    return `<div class="card"><h3>开始执行</h3>
      ${renderWorkflowSummary()}
      ${renderModelConfigPanel()}
      <p class="muted" style="font-size:12.5px;margin:0 0 12px">默认 models.json 调用真实 claude CLI；离线试跑可填 models_smoke.json。</p>
      <label>播种目录（可选：把真实代码拷入沙箱作为修改基线）</label><input type="text" id="a-seed" placeholder="例如 D:\\项目\\src">
      <button class="btn primary" onclick="runLoop()">▶ 开始执行</button></div>`;
  }
  if (t.status === "clarification_required" || t.status === "policy_blocked") {
    return `<div class="card"><h3>需要人工确认</h3>
      ${d.pending_questions.length ? `<ul class="plain">${d.pending_questions.map(q => `<li>${esc(q)}</li>`).join("")}</ul>` : `<p class="muted">没有记录到具体问题，可直接补充说明。</p>`}
      <label>你的答复 / 补充说明</label><textarea id="a-answer" rows="3"></textarea>
      <button class="btn primary" onclick="resumeTask()">提交答复并重过门禁</button></div>`;
  }
  if (t.status === "done") {
    const list = d.pending_delivery || [];
    if (!list.length) return d.delivery ? "" : `<div class="card"><h3>交付</h3><p class="muted" style="margin:0">没有待交付的变更。</p></div>`;
    return `<div class="card"><h3>交付<span class="aux">写回真实目录，需人工确认</span></h3>
      <div style="margin-bottom:12px">${list.map(c => `<span class="file-chip"><span class="op-${esc(c.action)}">${c.action === "delete" ? "−" : "＋"}</span>${esc(c.path)}</span>`).join("")}</div>
      <label>目标目录</label><input type="text" id="a-dest" placeholder="例如 D:\\项目\\src">
      <button class="btn danger" onclick="deliverTask()">确认交付 ${list.length} 项变更</button></div>`;
  }
  if (t.status === "failed") {
    return `<div class="card"><h3>执行失败</h3><p class="muted" style="margin:0 0 12px">查看 <span class="mono">tasks/${esc(t.task_id)}/artifacts/model_calls/</span> 下的 meta.json 定位失败原因。</p>
      <button class="btn primary" onclick="continueTask()">继续执行</button></div>`;
  }
  return "";
}

function renderRound(r) {
  const review = r.review;
  let verdictBadge = "";
  if (review) {
    const map = { pass: ["var(--green)", "var(--green-dim)", "审核通过"], revise: ["var(--amber)", "var(--amber-dim)", "要求返修"], block: ["var(--red)", "var(--red-dim)", "审核拒绝"] };
    const [color, dim, label] = map[review.verdict] || ["var(--faint)", "var(--surface-2)", review.verdict];
    verdictBadge = `<span class="badge" style="background:${dim};color:${color}"><span class="dot" style="background:${color}"></span>${esc(label)}</span>`;
  }
  let html = `<div class="card"><h3>第 ${esc(r.index)} 轮 ${verdictBadge}</h3>`;
  if (r.changes) {
    html += `<div>${r.changes.map(c => `<span class="file-chip"><span class="op-${esc(c.action)}">${c.action === "delete" ? "−" : "＋"}</span>${esc(c.path)}</span>`).join("")}</div>`;
  }
  if (r.diff) html += `<details open><summary>代码 diff</summary><div class="body"><pre class="diff">${renderDiff(r.diff)}</pre></div></details>`;
  if (review) {
    if (review.summary) html += `<p style="margin:12px 0 0;font-size:13.5px">审核结论：${esc(review.summary)}</p>`;
    if ((review.issues || []).length) {
      html += `<table class="issues"><tr><th>严重度</th><th>位置</th><th>问题</th><th>建议</th></tr>` +
        review.issues.map(i => `<tr><td><span class="sev sev-${esc(i.severity)}">${esc(i.severity)}</span></td>
          <td class="mono">${esc(i.file)}${i.line ? ":" + i.line : ""}</td><td>${esc(i.message)}</td><td class="muted">${esc(i.suggestion)}</td></tr>`).join("") + `</table>`;
    }
  }
  if (r.policy_check && r.policy_check.passed === false) {
    html += `<p style="color:var(--red);margin:12px 0 0">策略拦截：${(r.policy_check.issues || []).map(esc).join("；")}</p>`;
  }
  return html + `</div>`;
}

function renderDiff(diff) {
  return diff.split("\n").map(line => {
    const cls = line.startsWith("---") || line.startsWith("+++") ? "dl-meta"
      : line.startsWith("@@") ? "dl-hunk"
      : line.startsWith("+") ? "dl-add" : line.startsWith("-") ? "dl-del" : "";
    return `<span class="${cls}">${esc(line)}</span>`;
  }).join("");
}

// ---- 经验记忆 ----

async function loadMemory() {
  try {
    const records = await api("/api/memory");
    updateMemCount(records);
    if (view === "memory") renderMemory(records);
  } catch (e) { showError(e.message); }
}

function updateMemCount(records) {
  const pending = records.filter(r => r.status === "pending").length;
  const el = document.getElementById("mem-cnt");
  el.style.display = pending ? "" : "none";
  el.textContent = pending;
}

function memItem(r, ops) {
  return `<div class="mem-item ${r.status === "rejected" ? "rejected" : ""}">
    <div class="text">${esc(r.text)}
      <div class="sub"><span class="kind kind-${esc(r.kind)}">${esc(KIND_LABEL[r.kind] || r.kind)}</span>
        <span>${esc(r.experience_id)}</span>
        ${r.source_task ? `<span>来源 ${esc(r.source_task)}</span>` : ""}
        <span>${esc(fmtTime(r.updated_at))}</span></div>
    </div>
    ${ops ? `<div class="ops">${ops}</div>` : ""}</div>`;
}

function renderMemory(records) {
  const pending = records.filter(r => r.status === "pending");
  const approved = records.filter(r => r.status === "approved");
  const rejected = records.filter(r => r.status === "rejected");
  let html = `
    <div class="card"><h3>经验记忆<span class="aux">审核问题与人工澄清自动沉淀为候选经验；只有你批准的经验才会注入后续任务的规划提示</span></h3>
      <label>手工录入经验（作者即评审人，直接生效）</label>
      <div style="display:flex;gap:10px"><input type="text" id="m-text" style="margin:5px 0" placeholder="例如：本项目所有 API 返回必须带 request_id 字段">
      <button class="btn primary" style="flex:none;align-self:center" onclick="addMemory()">录入</button></div></div>`;

  html += `<div class="section-title">待评审（${pending.length}）</div>`;
  html += pending.length
    ? pending.map(r => memItem(r, `<button class="btn ok sm" onclick="reviewMemory('${esc(r.experience_id)}','approve')">✓ 批准</button>
        <button class="btn no sm" onclick="reviewMemory('${esc(r.experience_id)}','reject')">✕ 驳回</button>`)).join("")
    : `<p class="faint" style="margin:4px 2px">没有待评审的经验。</p>`;

  html += `<div class="section-title">已批准（${approved.length}）</div>`;
  html += approved.length
    ? approved.map(r => memItem(r, `<button class="btn ghost sm" onclick="reviewMemory('${esc(r.experience_id)}','reject')">停用</button>`)).join("")
    : `<p class="faint" style="margin:4px 2px">还没有批准的经验。</p>`;

  if (rejected.length) {
    html += `<div class="section-title">已驳回（${rejected.length}）</div>`;
    html += rejected.map(r => memItem(r, `<button class="btn ghost sm" onclick="reviewMemory('${esc(r.experience_id)}','approve')">恢复</button>`)).join("");
  }
  document.getElementById("page").innerHTML = html;
}

async function addMemory() {
  try {
    const text = document.getElementById("m-text").value.trim();
    if (!text) { showError("请先填写经验内容。"); return; }
    await post("/api/memory", { text });
    showError("");
    loadMemory();
  } catch (e) { showError(e.message); }
}

async function reviewMemory(id, action) {
  try {
    await post(`/api/memory/${id}/${action}`, {});
    showError("");
    loadMemory();
  } catch (e) { showError(e.message); }
}

// ---- 动作 ----

async function createTask() {
  try {
    const files = document.getElementById("f-files").value.split("\n").map(s => s.trim()).filter(Boolean);
    const task = await post("/api/tasks", {
      title: document.getElementById("f-title").value,
      goal: document.getElementById("f-goal").value,
      input: document.getElementById("f-input").value,
      context_files: files,
    });
    document.getElementById("createDialog").close();
    showError("");
    selectTask(task.task_id);
  } catch (e) { showError(e.message); }
}

async function runLoop() {
  try {
    const modelsConfig = document.getElementById("a-models").value.trim() || "models.json";
    if (modelConfigPath !== modelsConfig) {
      modelConfigPath = modelsConfig;
      modelConfig = null;
      workflowConfig = null;
    }
    await ensureWorkflowLoaded();
    await post(`/api/tasks/${currentId}/run`, {
      models_config: modelsConfig,
      roles: collectRoleOverrides(),
      workflow: workflowPayloadForRun(),
      workspace_from: document.getElementById("a-seed").value.trim(),
    });
    showError("");
    setTimeout(() => { loadDetail(true); loadTasks(); }, 300);
  } catch (e) { showError(e.message); }
}
async function continueTask() {
  try {
    const modelsConfig = modelConfigPath || "models.json";
    await ensureWorkflowLoaded();
    await post(`/api/tasks/${currentId}/continue`, {
      models_config: modelsConfig,
      workflow: workflowPayloadForRun(),
      roles: collectRoleOverrides(),
    });
    showError("");
    setTimeout(() => { loadDetail(true); loadTasks(); }, 300);
  } catch (e) { showError(e.message); }
}

async function interruptTask() {
  try {
    if (!window.confirm("确认中断当前执行？")) return;
    await post(`/api/tasks/${currentId}/interrupt`, {});
    showError("");
    setTimeout(() => { loadDetail(true); loadTasks(); }, 500);
  } catch (e) { showError(e.message); }
}

async function ensureWorkflowLoaded() {
  if (!modelConfig && !modelConfigLoading) await loadModelConfig(false);
  if (!workflowConfig && !workflowLoading) await loadWorkflow(false);
}

ensureWorkflowLoaded();

async function resumeTask() {
  try {
    const answer = document.getElementById("a-answer").value.trim();
    if (!answer) { showError("请先填写答复内容。"); return; }
    await post(`/api/tasks/${currentId}/resume`, { answer });
    showError("");
    loadDetail(true); loadTasks(); loadMemory();
  } catch (e) { showError(e.message); }
}

async function deliverTask() {
  try {
    const dest = document.getElementById("a-dest").value.trim();
    if (!dest) { showError("请先填写目标目录。"); return; }
    if (!window.confirm(`确认把审核通过的变更写入 ${dest} ？此操作会修改真实文件。`)) return;
    const result = await post(`/api/tasks/${currentId}/deliver`, { dest, confirm: true });
    showError("");
    alert(`已交付 ${result.delivered.length} 项变更到 ${dest}`);
    loadDetail(true);
  } catch (e) { showError(e.message); }
}

// 支持 #TASK-xxx / #memory 深链，刷新后保持当前视图
const initialHash = decodeURIComponent(location.hash.slice(1));
if (initialHash === "memory") switchView("memory");
else if (initialHash === "models") switchView("models");
else if (initialHash === "workflow") switchView("workflow");
else if (initialHash) { currentId = initialHash; loadDetail(true); }
else renderTasksEmpty();
loadTasks();
loadMemory();
setInterval(loadTasks, 5000);
setInterval(loadMemory, 10000);
</script>
